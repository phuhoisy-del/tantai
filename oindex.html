<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Social Profile</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            color: white;
        }

        .container {
            width: 100%;
            max-width: 400px;
            padding: 20px;
            text-align: center;
        }

        .profile-img {
            width: 100px;
            height: 100px;
            border-radius: 50%;
            border: 3px solid white;
            margin-bottom: 15px;
            object-fit: cover;
        }

        h1 {
            font-size: 1.5rem;
            margin-bottom: 5px;
        }

        p {
            font-size: 0.9rem;
            opacity: 0.8;
            margin-bottom: 30px;
        }

        .links {
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .link-card {
            background: rgba(255, 255, 255, 0.2);
            padding: 15px;
            border-radius: 12px;
            text-decoration: none;
            color: white;
            font-weight: 600;
            transition: all 0.3s ease;
            backdrop-filter: blur(5px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }

        .link-card:hover {
            background: rgba(255, 255, 255, 0.4);
            transform: translateY(-3px);
        }

        .facebook-btn { border-left: 5px solid #1877F2; }
        .tiktok-btn { border-left: 5px solid #EE1D52; }

        .footer {
            margin-top: 40px;
            font-size: 0.8rem;
            opacity: 0.6;
        }
    </style>
</head>
<body>

    <div class="container">
        <img src="https://via.placeholder.com/150" alt="Avatar" class="profile-img">
        
        <h1>Dong Cong Tan Tai</h1>
        <p>Chào mừng bạn đến với thế giới của mình! ✨</p>

        <div class="links">
            <a href="https://facebook.com/yourusername" target="_blank" class="link-card facebook-btn">
                <i class="fab fa-facebook"></i> Kết nối trên Facebook
            </a>

            <a href="https://www.tiktok.com/@dmmyothi?_r=1&_t=ZS-94SljDDl32L" target="_blank" class="link-card tiktok-btn">
                <i class="fab fa-tiktok"></i> Theo dõi trên TikTok
            </a>
            
            </div>

        <div class="footer">
            © 2026 Design by Gemini
        </div>
    </div>

</body>
</html>
